baseURL: https://stdrice.github.io
languageCode: en-us
title: stdrice

theme: ["PaperMod"]

params:
  author: "stdrice"
  defaultTheme: auto
  ShowToc: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  disableThemeToggle: true
  ShowReadingTime: true
  ShowFullTextinRSS: true
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title"]

menu:
  main:
    - identifier: home
      name: "○"
      url: "/"
      weight: 1
    - identifier: me
      name: "me"
      url: "/me/"
      weight: 2
    - identifier: projects
      name: "projects"
      url: "/projects/"
      weight: 3
    - identifier: posts
      name: "posts"
      url: "/posts/"
      weight: 4
    - identifier: pages
      name: "pages"
      url: "/pages/"
      weight: 5
    - identifier: search
      name: "search"
      url: "/search/"
      weight: 6
    - identifier: vi
      name: "vi"
      url: "/vi/"
      weight: 7
    - identifier: rss
      name: "rss"
      url: "/index.xml/"
      weight: 8

markup:
  goldmark:
    renderer:
      unsafe: true

caches:
  images:
    dir: :cacheDir/images

outputs:
  home:
    - HTML
    - RSS
    - JSON
